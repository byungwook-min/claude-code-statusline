<svg xmlns="http://www.w3.org/2000/svg" width="760" height="182" viewBox="0 0 760 182" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="claude-code-statusline terminal preview">
  <defs>
