  <rect x="24" y="104" width="520" height="30" rx="6" fill="#1f6feb" fill-opacity="0.10"/>
  <text font-size="14.5" xml:space="preserve"><tspan x="34" y="124" fill="#8b949e">in:</tspan><tspan fill="#c9d1d9">98k</tspan><tspan fill="#8b949e"> out:</tspan><tspan fill="#c9d1d9">3</tspan><tspan fill="#484f58"> | </tspan><tspan fill="#8b949e">cache r:</tspan><tspan fill="#c9d1d9">97k</tspan><tspan fill="#8b949e"> w:</tspan><tspan fill="#c9d1d9">1k</tspan><tspan fill="#484f58"> | </tspan><tspan fill="#d2a8ff">Δ$0.04</tspan><tspan fill="#484f58"> | </tspan><tspan fill="#3fb950">$3.57</tspan></text>

